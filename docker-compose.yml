version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: medley-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medley_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - medley-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medley-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/medley_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    depends_on:
      - db
    networks:
      - medley-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: medley-ai
    ports:
      - "8000:8000"
    networks:
      - medley-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medley-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - medley-network

networks:
  medley-network:
    driver: bridge

volumes:
  db_data:
